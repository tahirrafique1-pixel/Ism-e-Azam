<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abjad Calculator | ابجد کیلکولیٹر</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald-deep: #064e3b;
            --emerald-mid: #059669;
            --emerald-light: #34d399;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #065f46, #022c22);
            font-family: 'Poppins', 'Noto Nastaliq Urdu', serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #022c22;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .logo-container {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--emerald-mid), var(--emerald-deep));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(52, 211, 153, 0.4);
            animation: morph 5s infinite ease-in-out, pulse 2s infinite;
        }

        .logo-text { font-size: 3rem; color: var(--gold); }

        @keyframes morph {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(52, 211, 153, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(52, 211, 153, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(52, 211, 153, 0.4); }
        }

        /* --- Main Content --- */
        #main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-in;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            transform: perspective(1000px) rotateX(2deg);
        }

        h1 {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--emerald-mid);
            border-radius: 15px;
            padding: 1.5rem;
            color: white;
            font-size: 1.8rem;
            font-family: 'Noto Nastaliq Urdu';
            resize: none;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* --- 3D Result Cards --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            padding: 1.5rem;
            border-radius: 20px;
            border-bottom: 4px solid var(--emerald-light);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-10px) rotateY(10deg);
            border-bottom-color: var(--gold);
        }

        .stat-label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--emerald-light);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        input[readonly] {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            width: 100%;
            font-size: 2rem;
            font-family: 'Poppins';
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <div class="logo-text">ع</div>
        </div>
        <h2 style="margin-top: 2rem; color: var(--gold); letter-spacing: 3px;">ABJAD CALC</h2>
    </div>

    <div id="main-content">
        <div class="hero-card">
            <h1>ابجد کیلکولیٹر</h1>
            <p style="margin-bottom: 2rem; opacity: 0.8;">Enter your text to discover its numerical essence</p>
            
            <textarea id="urdu-input" placeholder="یہاں تحریر لکھیں..." rows="1"></textarea>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">First Character</span>
                    <input type="text" id="first-char" readonly placeholder="-">
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Letters</span>
                    <input type="text" id="total-chars" readonly value="0">
                </div>
                <div class="stat-card" style="border-bottom-color: var(--gold);">
                    <span class="stat-label" style="color: var(--gold);">Total Abjad Value</span>
                    <input type="text" id="abjad-value" readonly value="0">
                </div>
            </div>
        </div>
    </div>

    <script>
        const abjadValues = {
            'ا': 1, 'ب': 2, 'ج': 3, 'د': 4, 'ہ': 5, 'و': 6, 'ز': 7, 'ح': 8, 'ط': 9,
            'ی': 10, 'ک': 20, 'ل': 30, 'م': 40, 'ن': 50, 'س': 60, 'ع': 70, 'ف': 80, 'ص': 90,
            'ق': 100, 'ر': 200, 'ش': 300, 'ت': 400, 'ث': 500, 'خ': 600, 'ذ': 700, 'ض': 800, 'ظ': 900, 'غ': 1000,
            // Additional variations
            'آ': 1, 'ٹ': 400, 'پ': 2, 'چ': 3, 'ڈ': 4, 'ڑ': 200, 'ژ': 7, 'گ': 20, 'ے': 10, 'ؤ': 6, 'ئ': 10, 'ں': 50
        };

        // Splash Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.opacity = '1';
                    main.style.transform = 'translateY(0)';
                }, 1000);
            }, 5000); // 5 Seconds delay
        });

        const urduInput = document.getElementById('urdu-input');
        const firstChar = document.getElementById('first-char');
        const totalChars = document.getElementById('total-chars');
        const abjadValue = document.getElementById('abjad-value');

        urduInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
           
            const text = this.value.trim();
            const textWithoutSpaces = text.replace(/\s/g, '');
           
            if (textWithoutSpaces.length > 0) {
                firstChar.value = textWithoutSpaces[0];
            } else {
                firstChar.value = '-';
            }
           
            totalChars.value = textWithoutSpaces.length;
           
            let totalValue = 0;
            for (let char of textWithoutSpaces) {
                if (abjadValues[char]) {
                    totalValue += abjadValues[char];
                }
            }
            abjadValue.value = totalValue;
        });
    </script>
</body>
</html>
