        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #065f46, #022c22);
            font-family: 'Poppins', 'Noto Nastaliq Urdu', serif;
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #022c22;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .logo-3d {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--gold), #8e6d13);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            color: var(--emerald-deep);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.5);
            animation: pulse3d 2s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        @keyframes pulse3d {
            0%, 100% { transform: scale(1) rotateY(0deg); }
            50% { transform: scale(1.1) rotateY(10deg); box-shadow: 0 20px 50px rgba(16, 185, 129, 0.3); }
        }

        /* --- Main Layout --- */
        #main-content {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
            padding: 2rem 1rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-section {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- Input Styling --- */
        .input-wrapper { margin-bottom: 2rem; }
        
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--emerald-light);
            border-radius: 15px;
            padding: 1rem;
            color: white;
            font-size: 1.5rem;
            font-family: 'Noto Nastaliq Urdu';
            text-align: center;
            transition: 0.3s;
            outline: none;
        }

        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* --- Result Grid (3D Cards) --- */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            padding: 1.2rem;
            border-radius: 20px;
            border-bottom: 3px solid var(--emerald-light);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-bottom-color: var(--gold);
            background: rgba(255,255,255,0.1);
        }

        .card-label {
            font-size: 0.8rem;
            color: var(--gold-light);
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            word-break: break-word;
        }

        /* --- Virtues Section --- */
        .virtue-card {
            background: rgba(2, 44, 34, 0.6);
            border-left: 4px solid var(--gold);
            padding: 1.5rem;
            border-radius: 15px;
            margin-top: 1rem;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .virtue-name { color: var(--gold); font-weight: bold; margin-bottom: 0.5rem; display: block; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card-value { font-size: 1.1rem; }
        }
        .logo-image {
    width: 120px;           /* Adjust size as needed */

    transition: transform 0.3s ease;
}

            const ismDisplay = document.getElementById('ism-e-azam');

            if (val === 0) { ismDisplay.innerText = "-"; return; }

            // Logic: Exact Match
            let matches = asmaUlHusna.filter(a => a.value === val);
            
            // Logic: Simple Combination of 2
            if (matches.length === 0) {
                for(let i=0; i<asmaUlHusna.length; i++) {
                    for(let j=i+1; j<asmaUlHusna.length; j++) { 
if(asmaUlHusna[i].value + asmaUlHusna[j].value === val) {

            }          
if(matches.length===0){
               for(let k=j+1; k<asmaUlHusna.length; k++) { if(asmaUlHusna[i].value + asmaUlHusna[j].value + asmaUlHusna[k].value === val) {

}

}
